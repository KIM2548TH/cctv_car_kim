{% for log in anomaly_logs %}
<div
    class="flex items-center gap-3 shrink-0 group bg-surface px-4 py-2 rounded-lg border border-white/5 hover:border-white/10 transition-colors">
    <span class="text-xs font-mono text-slate-400">{{ log.timestamp.strftime('%H:%M:%S') }}</span>
    <span class="text-xs font-bold text-slate-200">{{ log.camera_id }}</span>
    <span class="text-xs font-medium text-red-500 bg-red-500/10 px-2 py-0.5 rounded capitalize">{{
        log.event_type.replace('_', ' ') }}</span>
    {% if log.media_video_url or log.media_snapshot_url %}
    <a href="{{ url_for('index.anomaly_detail', event_id=log.id) }}"
        class="ml-1 text-[16px] text-emerald-400 opacity-60 hover:opacity-100 transition-opacity" title="View Details">
        <span class="material-symbols-outlined align-middle" style="font-size: 16px;">visibility</span>
    </a>
    {% endif %}
</div>
{% else %}
<div class="flex items-center justify-center p-4 text-slate-500 text-xs w-full">
    No recent anomalies recorded
</div>
{% endfor %}
